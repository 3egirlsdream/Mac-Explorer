<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>FKFinder</title>
    <base href="/" />
    <link href="_content/Masa.Blazor/css/masa-blazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="FKFinder.styles.css" rel="stylesheet" />
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="loading-screen">
            <p>FKFinder 加载中...</p>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="_content/Masa.Blazor/js/masa-blazor.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/column-resize.js"></script>
    <script src="js/preview-resize.js"></script>
    <script src="js/scroll-memory.js"></script>
    <script src="js/native-drag.js"></script>
    <script>
        // Enable HTML5 drag ghost for all draggable elements (Blazor doesn't set dataTransfer)
        document.addEventListener('dragstart', function(e) {
            var el = e.target.closest('[draggable="true"]');
            if (el && e.dataTransfer) {
                e.dataTransfer.setData('text/plain', '');
                e.dataTransfer.effectAllowed = 'move';

                // Inject drag count badge synchronously so WKWebView captures it in the ghost.
                // Read count from data attribute (set at render time) to avoid timing issues
                // where WKWebView's mouseup clears .selected before dragstart fires.
                var countAttr = el.getAttribute('data-selected-count');
                var count = countAttr ? parseInt(countAttr, 10) : 0;
                if (count <= 1) {
                    count = document.querySelectorAll('.file-list-row.selected, .file-grid-item.selected').length;
                }
                if (count > 1 && (countAttr || el.matches('.selected'))) {
                    var badge = document.createElement('div');
                    badge.className = 'drag-count-badge';
                    badge.textContent = count;
                    el.appendChild(badge);
                    // Remove after ghost is captured
                    requestAnimationFrame(function() {
                        if (badge.parentNode) badge.parentNode.removeChild(badge);
                    });
                }
            }
        });

        // Create a Blob URL from a byte array for efficient local image display
        function createBlobUrl(byteArray, mimeType) {
            var blob = new Blob([byteArray], { type: mimeType || 'image/png' });
            return URL.createObjectURL(blob);
        }
        // Batch create Blob URLs: takes array of {id, bytes} and returns {id, url}
        function createBlobUrlBatch(items) {
            var result = {};
            for (var i = 0; i < items.length; i++) {
                var blob = new Blob([items[i].bytes], { type: 'image/png' });
                result[items[i].id] = URL.createObjectURL(blob);
            }
            return result;
        }
        // Revoke a single Blob URL
        function revokeBlobUrl(url) {
            URL.revokeObjectURL(url);
        }
        // Batch revoke Blob URLs
        function revokeBlobUrls(urls) {
            for (var i = 0; i < urls.length; i++) {
                URL.revokeObjectURL(urls[i]);
            }
        }
    </script>

</body>

</html>

<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Mask to cut out magnifying glass area (interior + stroke + gap) from folder -->

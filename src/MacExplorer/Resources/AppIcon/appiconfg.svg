            <line x1="350" y1="342" x2="384" y2="376" stroke="black" stroke-width="22" stroke-linecap="round"/>
        </mask>
    </defs>
    <!-- Folder shape with mask applied -->
    <path d="M104,175 L104,148 C104,136.95 112.95,128 124,128 L184,128 C192.2,128 199.8,132.6 203.6,139.6 L212.4,155.4 C216.2,162.4 223.8,167 232,167 L332,167 C343.05,167 352,175.95 352,187 L352,322 C352,333.05 343.05,342 332,342 L124,342 C112.95,342 104,333.05 104,322 Z" fill="white" mask="url(#folder-mask)"/>
    <!-- Magnifying glass circle (outline only, interior transparent) -->
    <circle cx="320" cy="312" r="42" fill="none" stroke="white" stroke-width="14"/>
    <!-- Magnifying glass handle -->
    <line x1="350" y1="342" x2="384" y2="376" stroke="white" stroke-width="14" stroke-linecap="round"/>
</svg>

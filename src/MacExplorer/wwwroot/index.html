<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mac Explorer</title>
    <base href="/" />
    <link href="_content/Masa.Blazor/css/masa-blazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="MacExplorer.styles.css" rel="stylesheet" />
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="loading-screen">
            <p>文件资源管理器 加载中...</p>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss" aria-label="关闭">&times;</span>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="_content/Masa.Blazor/js/masa-blazor.js"></script>
    <script src="js/echarts.min.js"></script>
    <script src="js/echarts-wordcloud.min.js"></script>
    <script src="js/wordcloud.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/column-resize.js"></script>
    <script src="js/preview-resize.js"></script>
    <script src="js/scroll-memory.js"></script>
    <script src="js/native-drag.js"></script>
    <script src="js/theme.js"></script>
    <script>
        // ── Debug: log ALL drag events at JS level ──
        (function() {
            var events = ['dragstart','dragend','dragenter','dragover','dragleave','drop'];
            events.forEach(function(evt) {
                document.addEventListener(evt, function(e) {
                    var el = e.target;
                    var path = el && el.closest ? (el.closest('[data-path]') || {}).getAttribute('data-path') : null;
                    console.log('[JS-Drag] ' + evt + ' target=' + (el.tagName||'?') + ' path=' + (path||'N/A') + ' isDir=' + (el.closest && el.closest('[data-is-directory="true"]') ? 'Y' : 'N'));
                }, true);
            });
        })();

        // Enable HTML5 drag ghost for all draggable elements (Blazor doesn't set dataTransfer)
        document.addEventListener('dragstart', function(e) {
            var el = e.target.closest('[draggable="true"]');
            if (el && e.dataTransfer) {
                // Always set effectAllowed to 'move' for compatibility with Mac Catalyst bridge
                e.dataTransfer.effectAllowed = 'move';
                // Only set text/plain if native-drag.js hasn't already set file URLs
                if (!e.dataTransfer.types || !e.dataTransfer.types.includes('text/uri-list')) {
                    e.dataTransfer.setData('text/plain', '');
                }

                // Inject drag count badge synchronously so WKWebView captures it in the ghost.
                // Read count from data attribute (set at render time) to avoid timing issues
                // where WKWebView's mouseup clears .selected before dragstart fires.
                var countAttr = el.getAttribute('data-selected-count');
                var count = countAttr ? parseInt(countAttr, 10) : 0;
                if (count <= 1) {
                    count = document.querySelectorAll('.file-list-row.selected, .file-grid-item.selected').length;
                }
                // Fallback: use captured selection from mousedown (native-drag.js)
                // in case Blazor hasn't re-rendered the DOM before dragstart.
                if (count <= 1 && window.fkfinderDragCapture) {
                    count = window.fkfinderDragCapture.getSelectedCount();
                }
                if (count > 1 && (countAttr || el.matches('.selected') || (window.fkfinderDragCapture && window.fkfinderDragCapture.getSelectedCount() > 1))) {
                    var badge = document.createElement('div');
                    badge.className = 'drag-count-badge';
                    badge.textContent = count;
                    el.appendChild(badge);
                    // Remove after ghost is captured
                    requestAnimationFrame(function() {
                        if (badge.parentNode) badge.parentNode.removeChild(badge);
                    });
                }
            }
        });

        // Create a Blob URL from a byte array for efficient local image display
        function createBlobUrl(byteArray, mimeType) {
            var blob = new Blob([byteArray], { type: mimeType || 'image/png' });
            return URL.createObjectURL(blob);
        }
        // Batch create Blob URLs: takes array of {id, bytes} and returns {id, url}
        function createBlobUrlBatch(items) {
            var result = {};
            for (var i = 0; i < items.length; i++) {
                var blob = new Blob([items[i].bytes], { type: 'image/png' });
                result[items[i].id] = URL.createObjectURL(blob);
            }
            return result;
        }
        // Revoke a single Blob URL
        function revokeBlobUrl(url) {
            URL.revokeObjectURL(url);
        }
        // Batch revoke Blob URLs
        function revokeBlobUrls(urls) {
            for (var i = 0; i < urls.length; i++) {
                URL.revokeObjectURL(urls[i]);
            }
        }
    </script>

</body>

</html>
